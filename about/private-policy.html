<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Account Deletion - Karta Polaka</title>
    <style>
        :root {
            --b: #f7f7f5;
            --t: #1a1a1a;
            --s: #595959;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --b: #0f0f10;
                --t: #e8e8e6;
                --s: #a1a1a1;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--b);
            color: var(--t);
            font: 1rem/1.6 system-ui, -apple-system, sans-serif;
        }
        main {
            max-width: 760px;
            margin: auto;
            padding: 5rem 2rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .tab {
            width: 100%;
            border-top: 1px solid var(--s);
            overflow: hidden;
        }
        .tab:last-child { border-bottom: 1px solid var(--s); }
        input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }
        .tab-label {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 0;
            font-size: .8rem;
            font-weight: bold;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .tab-label::after {
            content: "\276F";
            transition: all .35s;
        }
        .tab-content {
            max-height: 0;
            transition: all .35s;
            overflow: hidden;
        }
        input:checked ~ .tab-content {
            max-height: 500px;
            padding-bottom: 2rem;
        }
        input:checked ~ .tab-label::after {
            transform: rotate(90deg);
        }
        a { color: inherit; border-bottom: 1px solid var(--s); text-decoration: none; }
    </style>
</head>
<body>
<main>
    <h1>Account & Data Deletion</h1>
    <div class="tabs">
        <div class="tab">
            <input type="checkbox" id="chck1">
            <label class="tab-label" for="chck1">English</label>
            <div class="tab-content">
                <p>You can request deletion via email: <a href="mailto:karta.polaka.info@gmail.com">karta.polaka.info@gmail.com</a></p>
            </div>
        </div>
        <div class="tab">
            <input type="checkbox" id="chck2">
            <label class="tab-label" for="chck2">Русский</label>
            <div class="tab-content">
                <p>Удаление через почту: <a href="mailto:karta.polaka.info@gmail.com">karta.polaka.info@gmail.com</a></p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
