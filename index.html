<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset=utf-8>
    <meta name=viewport content="width=device-width,initial-scale=1">

    <title>Karta Polaka - Prepare for Your Polish Card Exam</title>
    <meta name=description content="Karta Polaka - Preparatory materials for Polish Card exam. Learn about Poland's history, culture, traditions, and famous Poles.">
    <meta property="og:title" content="Karta Polaka">
    <meta property="og:description" content="Prepare for your Polish Card exam with interactive learning materials">
    <meta property="og:image" content="https://kartapolaka-app.github.io/website/assets/appicon_512.png">

    <link rel=icon href=data:,>

    <style>
        :root {
            --b: #f7f7f5;
            --t: #1a1a1a;
            --s: #595959;
            --p: #2196F3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --b: #0f0f10;
                --t: #e8e8e6;
                --s: #a1a1a1;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0
        }

        body {
            min-height: 100vh;
            background: var(--b);
            color: var(--t);
            font: 1rem/1.6 system-ui, -apple-system, sans-serif;
            transition: background .3s, color .3s;
        }

        main {
            max-width: 940px;
            margin: auto;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-text {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .hero-image {
            flex: 0.8;
            max-width: 320px;
            width: 100%;
            animation: fadeInUp 0.4s ease-out 0.2s backwards;
        }

        .play-button {
            animation: fadeInUp 0.4s ease-out 0.2s backwards;
        }

        .footer-links, .copy-text {
            animation: fadeInUp 0.4s ease-out 0.2s backwards;
        }

        .hero {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4rem;
            text-align: left;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                gap: 3rem;
            }
        }

        .hero-image img {
            width: 100%;
            height: auto;
            border-radius: 2rem;
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px;
            display: block;
            padding: 0.8rem;
            background: rgba(128, 128, 128, 0.03);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: .8rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--s);
            margin-bottom: 1rem;
            display: block;
        }

        p.description {
            font-size: 1.1rem;
            color: var(--s);
            margin-bottom: 2.5rem;
            max-width: 500px;
        }

        .play-button {
            display: inline-block;
            transition: transform 0.2s ease;
            line-height: 0;
        }

        .play-button:hover {
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 6rem;
            display: flex;
            gap: 2.5rem;
            font-size: 0.9rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-links a {
            color: var(--s);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color .2s;
        }

        .footer-links a:hover {
            border-bottom-color: var(--s);
        }

        .copy-text {
            font-size: 0.75rem;
            color: var(--s);
            margin-top: 4rem;
            opacity: 0.8;
            text-align: center;
        }
    </style>
</head>

<body>
<main>
    <section class="hero">
        <div class="hero-text">
            <span class="tagline">Karta Polaka</span>
            <h1>Подготовьтесь к экзамену на Карту Поляка</h1>
            <p class="description">
                Овладейте необходимыми знаниями об истории Польши, культуре, традициях и знаменитых поляках с помощью интерактивных учебных материалов.
            </p>

            <a href="https://play.google.com/store/apps/details?id=com.kartapolaka.app" class="play-button" target="_blank">
                <img style="width: 200px; height: auto"
                     src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png"
                     alt="Скачать в Google Play">
            </a>
        </div>
        <div class="hero-image">
            <img style="width: 300px; height: 300px" src="https://play-lh.googleusercontent.com/mCdZCityRsFGlCx_O2CrRRhlyQWosIHMV-KSnWAdZTuaITrsBbrJo0OHgg9k3lC6OEpXOBrKlfYFaf66uUmhfQ=w480-h960-rw" alt="Karta Polaka App">
        </div>
    </section>

    <div class="footer-links">
        <a href="about/private-policy.html">Privacy Policy</a>
        <a href="mailto:karta.polaka.info@gmail.com">Contact</a>
    </div>

    <p class="copy-text">
        © 2024 Karta Polaka. All rights reserved. <br>
    </p>
</main>
</body>
</html>
